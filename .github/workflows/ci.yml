name: CI

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - 'v*' # Запускать при создании тегов v0.1.0, v1.0.0 и т.д.

permissions:
  contents: write # Разрешаем создание тегов ботом

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run Tests
        run: task test

      - name: Check Generation Diff
        run: task check-diff

  # Новая джоба для проброса тега в подмодуль gen/go
  tag-module:
    needs: validate
    # Запускаем только если это пуш тега и всё в validate прошло успешно
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create and Push Module Tag
        run: |
          CURRENT_TAG=${{ github.ref_name }}
          MODULE_TAG="gen/go/${CURRENT_TAG}"
          
          echo "Syncing tag ${CURRENT_TAG} -> ${MODULE_TAG}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          
          # Проверяем, не существует ли уже такой тег (на всякий случай)
          if git rev-parse "$MODULE_TAG" >/dev/null 2>&1; then
            echo "Tag ${MODULE_TAG} already exists"
          else
            git tag "$MODULE_TAG"
            git push origin "$MODULE_TAG"
          fi
